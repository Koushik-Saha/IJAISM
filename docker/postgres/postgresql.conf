# Postgres tuning for a 24 GB ARM host shared with the Next.js app + Caddy.
# We deliberately do NOT claim the whole box — the app needs ~1-2 GB headroom.

listen_addresses = '*'
port = 5432
max_connections = 100

# Memory
shared_buffers = 512MB                # ~2 GB on dedicated boxes; 512 MB is safe shared
effective_cache_size = 2GB
work_mem = 16MB
maintenance_work_mem = 128MB

# WAL / durability
wal_level = replica
max_wal_size = 1GB
min_wal_size = 128MB
synchronous_commit = on               # set to 'off' only if you accept 24h RPO from daily backups

# Query planner
random_page_cost = 1.1                # SSD-backed block storage
effective_io_concurrency = 200

# Logging — quiet by default; flip to track slow queries when needed
log_min_duration_statement = 1000     # ms; logs anything > 1 s
log_line_prefix = '%t [%p] %u@%d '
log_timezone = 'UTC'

# Autovacuum — bump up since the app does frequent inserts (notifications, logs)
autovacuum_max_workers = 3
autovacuum_naptime = 30s

timezone = 'UTC'
