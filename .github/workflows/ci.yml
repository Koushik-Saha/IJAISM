name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      # Build-time placeholders — same set the Dockerfile expects so `next build`
      # passes its page-data collection step. Real secrets only live in
      # production (.env on the VM) and the cd.yml deploy step.
      DATABASE_URL: "postgresql://postgres:password@localhost:5432/c5k_db"
      JWT_SECRET: "ci-jwt-secret"
      NEXTAUTH_SECRET: "ci-nextauth-secret"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      STRIPE_SECRET_KEY: "sk_test_ci_placeholder"
      STRIPE_WEBHOOK_SECRET: "whsec_ci_placeholder"
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "pk_test_ci_placeholder"
      STRIPE_PRICE_BASIC: "price_ci_placeholder"
      STRIPE_PRICE_PREMIUM: "price_ci_placeholder"
      STRIPE_PRICE_INSTITUTIONAL: "price_ci_placeholder"
      PAYPAL_CLIENT_ID: "ci_placeholder"
      PAYPAL_CLIENT_SECRET: "ci_placeholder"

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: c5k_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Apply Prisma Schema
      # Project uses `prisma db push` (no migrations dir). Same approach as cd.yml.
      run: npx prisma db push --accept-data-loss --skip-generate

    - name: Lint
      run: npm run lint

    - name: Type Check
      run: npx tsc --noEmit

    - name: Run Tests
      run: npm test
      env:
        CI: true

    - name: Build
      run: npm run build
