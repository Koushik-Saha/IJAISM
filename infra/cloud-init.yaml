#cloud-config
# First-boot bootstrap for the Oracle Cloud Ubuntu 22.04 ARM instance.
# Installs Docker + compose plugin, opens the firewall, creates /opt/ijaism,
# and arms a systemd unit that `docker compose up -d` on boot.

package_update: true
package_upgrade: false   # keep first boot fast; let unattended-upgrades handle it later

packages:
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - ufw
  - iptables-persistent
  - netfilter-persistent
  - fail2ban
  - unattended-upgrades

write_files:
  - path: /etc/systemd/system/ijaism.service
    permissions: "0644"
    content: |
      [Unit]
      Description=IJAISM docker-compose stack
      Requires=docker.service
      After=docker.service network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      WorkingDirectory=/opt/ijaism
      EnvironmentFile=-/opt/ijaism/.env
      ExecStartPre=/usr/bin/docker compose pull
      ExecStart=/usr/bin/docker compose up -d
      ExecStop=/usr/bin/docker compose down
      TimeoutStartSec=300

      [Install]
      WantedBy=multi-user.target

  - path: /etc/fail2ban/jail.local
    permissions: "0644"
    content: |
      [DEFAULT]
      bantime = 1h
      findtime = 10m
      maxretry = 5
      [sshd]
      enabled = true

runcmd:
  # ---- Swap (critical on small 2 GB boxes; harmless on large ones) ----
  # Gives the OOM killer breathing room so a memory spike doesn't kill Postgres
  # or the Node process. 2 GB swap + vm.swappiness=10 (prefer RAM, spill late).
  - |
    if [ ! -f /swapfile ]; then
      fallocate -l 2G /swapfile || dd if=/dev/zero of=/swapfile bs=1M count=2048
      chmod 600 /swapfile
      mkswap /swapfile
      swapon /swapfile
      echo '/swapfile none swap sw 0 0' >> /etc/fstab
      sysctl -w vm.swappiness=10
      echo 'vm.swappiness=10' >> /etc/sysctl.conf
    fi

  # ---- Docker engine + compose plugin ----
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  - chmod a+r /etc/apt/keyrings/docker.gpg
  - |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" \
      > /etc/apt/sources.list.d/docker.list
  - apt-get update -y
  - DEBIAN_FRONTEND=noninteractive apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - usermod -aG docker ubuntu

  # ---- Firewall: open 22, 80, 443, plus UDP 443 for HTTP/3 ----
  # Oracle's stock image filters iptables aggressively; we punch through and persist.
  - iptables -I INPUT 1 -p tcp --dport 22 -j ACCEPT
  - iptables -I INPUT 1 -p tcp --dport 80 -j ACCEPT
  - iptables -I INPUT 1 -p tcp --dport 443 -j ACCEPT
  - iptables -I INPUT 1 -p udp --dport 443 -j ACCEPT
  - netfilter-persistent save

  # ---- App workspace ----
  - mkdir -p /opt/ijaism
  - chown -R ubuntu:ubuntu /opt/ijaism

  # The repo (docker-compose.yml, docker/) is rsynced or git-pulled here as a
  # post-bootstrap manual step. We do NOT clone here because the repo is
  # private — a deploy key would have to be wired in, which is out of scope
  # for cloud-init v1.

  # ---- Enable but do not start the unit; manual first-time setup writes .env ----
  - systemctl daemon-reload
  - systemctl enable ijaism.service
  - systemctl enable fail2ban
  - systemctl start fail2ban

final_message: "IJAISM VM ready. Next: rsync the repo to /opt/ijaism, write .env, then `systemctl start ijaism`."
