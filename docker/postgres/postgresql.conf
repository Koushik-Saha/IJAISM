# Postgres tuning for a SMALL shared host (1 CPU / 2 GB RAM) running the
# Next.js app + Postgres + Caddy on the same box. Conservative on purpose:
# Postgres must leave ~1 GB for Node and ~100 MB for Caddy or the box OOMs.
#
# If you move to the free Oracle A1 shape (e.g. 12-24 GB), scale these up:
#   shared_buffers ≈ 25% RAM, effective_cache_size ≈ 60% RAM, max_connections 100.

listen_addresses = '*'
port = 5432
max_connections = 50                  # the app uses one Prisma pool; 50 is ample

# Memory (sized for ~2 GB total system RAM)
shared_buffers = 256MB
effective_cache_size = 768MB
work_mem = 8MB
maintenance_work_mem = 64MB

# WAL / durability
wal_level = replica
max_wal_size = 1GB
min_wal_size = 128MB
synchronous_commit = on               # set to 'off' only if you accept 24h RPO from daily backups

# Query planner
random_page_cost = 1.1                # SSD-backed block storage
effective_io_concurrency = 200

# Logging — quiet by default; flip to track slow queries when needed
log_min_duration_statement = 1000     # ms; logs anything > 1 s
log_line_prefix = '%t [%p] %u@%d '
log_timezone = 'UTC'

# Autovacuum — bump up since the app does frequent inserts (notifications, logs)
autovacuum_max_workers = 3
autovacuum_naptime = 30s

timezone = 'UTC'
