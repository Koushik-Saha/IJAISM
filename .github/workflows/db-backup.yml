name: Database backup → R2

on:
  schedule:
    - cron: '0 2 * * *'   # daily at 02:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: db-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Install Postgres client
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Dump database
        run: |
          set -euo pipefail
          STAMP=$(date -u +%Y-%m-%dT%H-%M-%SZ)
          FILE="ijaism-${STAMP}.sql.gz"
          pg_dump --no-owner --no-privileges --format=plain \
            "${{ secrets.DATABASE_URL }}" | gzip -9 > "$FILE"
          echo "BACKUP_FILE=$FILE" >> "$GITHUB_ENV"

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          # R2 is S3-compatible. AWS CLI just needs --endpoint-url.
          aws --endpoint-url "${{ secrets.R2_ENDPOINT }}" \
              s3 cp "$BACKUP_FILE" "s3://${{ secrets.R2_BACKUP_BUCKET }}/$BACKUP_FILE" \
              --no-progress
          # Retention is handled by an R2 lifecycle rule managed in Terraform
          # (30-day expiry on prefix /). No manual cleanup needed.

      - name: Verify backup
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws --endpoint-url "${{ secrets.R2_ENDPOINT }}" \
              s3 ls "s3://${{ secrets.R2_BACKUP_BUCKET }}/$BACKUP_FILE"
